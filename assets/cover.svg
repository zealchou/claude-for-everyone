<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" shape-rendering="crispEdges" font-family="'Courier New', monospace">
  <!-- 背景 -->
  <rect width="960" height="420" fill="#1a1c2c"/>
  <!-- 像素網格地平線 -->
  <g fill="#29366f">
    <rect x="0" y="330" width="960" height="6"/>
    <rect x="0" y="348" width="960" height="4"/>
    <rect x="0" y="364" width="960" height="3"/>
  </g>
  <!-- 背景星點 -->
  <g fill="#566c86">
    <rect x="60" y="40" width="6" height="6"/><rect x="180" y="80" width="5" height="5"/>
    <rect x="320" y="50" width="6" height="6"/><rect x="540" y="36" width="5" height="5"/>
    <rect x="720" y="70" width="6" height="6"/><rect x="860" y="44" width="5" height="5"/>
    <rect x="900" y="120" width="6" height="6"/><rect x="120" y="150" width="5" height="5"/>
    <rect x="820" y="170" width="6" height="6"/><rect x="40" y="240" width="6" height="6"/>
  </g>
  <g fill="#ffcd75">
    <rect x="250" y="30" width="6" height="6"/><rect x="640" y="58" width="6" height="6"/>
    <rect x="780" y="28" width="5" height="5"/>
  </g>

  <!-- ===== 像素機器人（友善助理）===== -->
  <g>
    <!-- 天線 -->
    <rect x="158" y="92" width="12" height="28" fill="#a7f0ff"/>
    <rect x="148" y="74" width="32" height="22" fill="#ffcd75"/>
    <rect x="154" y="80" width="8" height="8" fill="#ffffff"/>
    <!-- 頭（主體）-->
    <rect x="92" y="120" width="144" height="132" fill="#41a6f6"/>
    <!-- 像素圓角（四角挖空）-->
    <rect x="92" y="120" width="14" height="14" fill="#1a1c2c"/>
    <rect x="222" y="120" width="14" height="14" fill="#1a1c2c"/>
    <rect x="92" y="238" width="14" height="14" fill="#1a1c2c"/>
    <rect x="222" y="238" width="14" height="14" fill="#1a1c2c"/>
    <!-- 臉部螢幕 -->
    <rect x="112" y="142" width="104" height="76" fill="#1a1c2c"/>
    <!-- 眼睛 -->
    <rect x="132" y="162" width="20" height="22" fill="#a7f0ff"/>
    <rect x="176" y="162" width="20" height="22" fill="#a7f0ff"/>
    <rect x="138" y="168" width="6" height="6" fill="#ffffff"/>
    <rect x="182" y="168" width="6" height="6" fill="#ffffff"/>
    <!-- 微笑（U 形）-->
    <rect x="136" y="196" width="8" height="8" fill="#38b764"/>
    <rect x="144" y="202" width="40" height="8" fill="#38b764"/>
    <rect x="184" y="196" width="8" height="8" fill="#38b764"/>
    <!-- 脖子 + 身體 -->
    <rect x="150" y="252" width="28" height="14" fill="#3b7dd8"/>
    <rect x="116" y="266" width="96" height="52" fill="#3b7dd8"/>
    <rect x="116" y="266" width="10" height="10" fill="#1a1c2c"/>
    <rect x="202" y="266" width="10" height="10" fill="#1a1c2c"/>
    <!-- 胸口愛心（像素）-->
    <g fill="#ef7d57">
      <rect x="150" y="282" width="10" height="10"/><rect x="168" y="282" width="10" height="10"/>
      <rect x="142" y="290" width="44" height="10"/>
      <rect x="150" y="300" width="28" height="8"/>
      <rect x="158" y="308" width="12" height="6"/>
    </g>
  </g>

  <!-- ===== 對話泡泡（講人話）===== -->
  <g>
    <rect x="300" y="150" width="150" height="60" fill="#f4f4f4"/>
    <rect x="300" y="150" width="10" height="10" fill="#1a1c2c"/>
    <rect x="440" y="150" width="10" height="10" fill="#1a1c2c"/>
    <rect x="300" y="200" width="10" height="10" fill="#1a1c2c"/>
    <rect x="440" y="200" width="10" height="10" fill="#1a1c2c"/>
    <rect x="290" y="178" width="14" height="14" fill="#f4f4f4"/>
    <text x="375" y="188" font-size="30" font-weight="bold" fill="#1a1c2c" text-anchor="middle">你好！</text>
  </g>

  <!-- ===== 標題文字 ===== -->
  <text x="500" y="150" font-size="52" font-weight="bold" fill="#f4f4f4">Claude for</text>
  <text x="500" y="208" font-size="52" font-weight="bold" fill="#ffcd75">Everyone</text>
  <text x="502" y="250" font-size="24" font-weight="bold" fill="#a7f0ff">給每一個人的 Claude Code</text>
  <!-- 標語底條 -->
  <rect x="500" y="276" width="404" height="40" fill="#38b764"/>
  <rect x="500" y="276" width="8" height="8" fill="#1a1c2c"/>
  <rect x="896" y="276" width="8" height="8" fill="#1a1c2c"/>
  <rect x="500" y="308" width="8" height="8" fill="#1a1c2c"/>
  <rect x="896" y="308" width="8" height="8" fill="#1a1c2c"/>
  <text x="702" y="303" font-size="20" font-weight="bold" fill="#1a1c2c" text-anchor="middle">AI 講人話 · 不用會寫程式</text>
</svg>
